<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>ブログ一覧</title>
    
</head>

<body>
 
    <header class="site-header">
        <ul>
            <h1>BLOG</h1>
            <nav class="header-nav">
            <a href="/blog">ホーム</a>
            <a href="/blog/new" class="btn-new">投稿</a>
            </nav>
        </ul>
        </header>
        <ul>
            <li th:each="blog : ${blogs}">
            <!-- <li th:text="${blog.title}"></li> -->
            <a th:href="@{/blog/{id}(id=${blog.id})}" th:text="${blog.title}">タイトル</a> 
            </li>
        </ul>
   
</body>

</html>
